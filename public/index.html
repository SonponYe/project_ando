<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#080808" />
    <meta
      name="description"
      content="Ando — discover and stream full-length independent music, no login required."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Ando</title>

    <style>
      /* Shown instantly on first paint, before the JS bundle loads/React
         mounts — removed by index.js once the app renders. Keeps first
         load from flashing white and doubles as the PWA launch splash. */
      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #141414 0%, #080808 100%);
      }
      #boot-splash img {
        width: 44vw;
        max-width: 220px;
        animation: boot-pulse 1.6s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%, 100% { opacity: 0.85; transform: scale(1); }
        50%      { opacity: 1;    transform: scale(1.035); }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="boot-splash">
      <img src="%PUBLIC_URL%/ando-wordmark.png" alt="Ando" />
    </div>
    <div id="root"></div>
  </body>
</html>
